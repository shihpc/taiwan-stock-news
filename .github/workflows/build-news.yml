name: 每日建置台股新聞

on:
  workflow_dispatch:
    inputs:
      lookback:
        description: '近 N 個交易日'
        required: false
        default: '5'
  schedule:
    # 每天 22:30 台灣時間（UTC 14:30），週末也跑（2026-07-12 起，
    # 抓取範圍改為涵蓋近 N 個交易日的日曆日區間，週六日發布的新聞也收得到）。
    # 股票池用 FinMind 自建（build_pool_from_finmind，2026-07-10 起，
    # taiwan-stock-radar repo 已刪除），不依賴其他 repo 的排程順序。
    - cron: '30 14 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 90 分：連假時日曆日區間變長（池150×最多10日曆日>hourly-budget 1400），
    # Throttle 會睡到滿小時，60 分可能不夠
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build news.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python build_news.py --lookback "${{ github.event.inputs.lookback || '5' }}" --hourly-budget 1400

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "news.json 無變化，跳過 commit"
          else
            git commit -m "news update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
