name: 每日建置台股新聞

on:
  workflow_dispatch:
    inputs:
      lookback:
        description: '近 N 個交易日'
        required: false
        default: '5'
  schedule:
    # 每天三班（台灣時間，2026-07-12 起）：06:30 收清晨新聞（餵晨報時段）、
    # 15:00 收盤後第一波新聞、22:37 收全天新聞（2026-07-14 起晚班由 22:30 改
    # 22:37，純錯開 GitHub cron 整點/半點壅塞，非資料時序需求）。週末也跑
    # （抓取範圍為涵蓋近 N 個交易日的日曆日區間，週六日發布的新聞也收得到）。
    # GitHub cron 常態延遲 1~2 小時，實際完成時間比排程晚。
    # 股票池用 FinMind 自建（build_pool_from_finmind，2026-07-10 起，
    # taiwan-stock-radar repo 已刪除），不依賴其他 repo 的排程順序。
    - cron: '30 22 * * *'   # 06:30 台北（前一日 UTC 22:30）
    - cron: '0 7 * * *'     # 15:00 台北
    - cron: '37 14 * * *'   # 22:37 台北

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 90 分：連假時日曆日區間變長（池150×最多10日曆日>hourly-budget 1400），
    # Throttle 會睡到滿小時，60 分可能不夠
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build news.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python build_news.py --lookback "${{ github.event.inputs.lookback || '5' }}" --hourly-budget 1400

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "news.json 無變化，跳過 commit"
          else
            git commit -m "news update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
