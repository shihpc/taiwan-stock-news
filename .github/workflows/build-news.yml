name: 每日建置台股新聞

on:
  workflow_dispatch:
    inputs:
      lookback:
        description: '近 N 個交易日'
        required: false
        default: '5'
  schedule:
    # 主力觸發改為 Cloudflare Worker 定點 dispatch（2026-07-15 起）：
    # taiwan-flow-live-v2 worker 每天（含週末）台北 06:07–22:07 每小時 :07
    # workflow_dispatch 本檔，準點不受 GitHub cron 延遲影響。
    # 此處只留一班 21:37 台北當備援兜底（Worker 掛掉時每天至少收一次全天新聞）；
    # GitHub cron 常態延遲 1~2 小時，備援實際完成時間比排程晚——故排在 21:37 而非
    # 22:37：即使延遲 1~2 小時仍落在當日 21:00 後（同日、hour>=21），不會跨台北午夜
    # 把 generated_at 滾成隔日、覆蓋 Worker 22:07 已寫好的當日晚班而破壞下游 pm 閘門
    #（2026-07-16 修：原 22:37 延遲到 00:17 覆蓋 22:18 好資料，害彙總分析 pm 場永久 skip）。
    # 收盤 13:30，21:37 已涵蓋全天新聞，當備援足夠；最後一次即時新聞仍由 Worker 22:07 收。
    # 週末也跑（抓取範圍為涵蓋近 N 個交易日的日曆日區間，週六日發布的新聞也收得到）。
    # 股票池用 FinMind 自建（build_pool_from_finmind，2026-07-10 起，
    # taiwan-stock-radar repo 已刪除），不依賴其他 repo 的排程順序。
    - cron: '37 13 * * *'   # 21:37 台北（備援；早於 22:07 Worker 主班，避免延遲跨午夜覆蓋）

permissions:
  contents: write

# Worker 每小時 dispatch＋備援 cron 可能重疊（單次建置最長 90 分），
# 同 group 排隊不並行、不取消進行中的（後到的等前一輪跑完再跑）
concurrency:
  group: build-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # 90 分：連假時日曆日區間變長（池150×最多10日曆日>hourly-budget 1400），
    # Throttle 會睡到滿小時，60 分可能不夠
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build news.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python build_news.py --lookback "${{ github.event.inputs.lookback || '5' }}" --hourly-budget 1400

      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "news.json 無變化，跳過 commit"
          else
            git commit -m "news update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
