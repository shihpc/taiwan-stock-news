<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新聞晨報 · 股市雷達</title>
<style>
  :root{
    --bg:#0b1120; --bg2:#111a2e; --card:#16213a; --card-hover:#1d2b4a;
    --line:#243556; --txt:#e6edf7; --muted:#8aa0c0; --accent:#4f9cff;
    --mkt:#f59e0b; --chip:#1b2a49;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,var(--bg2),var(--bg));
    color:var(--txt); min-height:100vh; padding:24px 16px 64px;
  }
  .wrap{max-width:820px;margin:0 auto}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .top a.back{color:var(--muted);text-decoration:none;font-size:.9rem;border:1px solid var(--line);
    border-radius:9px;padding:4px 10px;transition:.15s}
  .top a.back:hover{color:var(--accent);border-color:var(--accent)}
  header h1{font-size:1.5rem;font-weight:700;letter-spacing:.5px}
  .sub{color:var(--muted);font-size:.85rem;margin-top:6px;line-height:1.6}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 8px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:7px 11px;font-size:.78rem;color:var(--muted)}
  .stat b{color:var(--txt);font-size:.95rem;font-weight:700;margin-right:4px}
  .bar{position:sticky;top:0;z-index:5;padding:8px 0 10px;
    background:linear-gradient(var(--bg) 82%,transparent)}
  #q{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:11px 14px;color:var(--txt);font-size:.95rem;outline:none;transition:border-color .15s}
  #q:focus{border-color:var(--accent)}
  .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
  .lbl{color:var(--muted);font-size:.72rem;margin-right:2px}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 12px;
    font-size:.8rem;color:var(--muted);cursor:pointer;transition:.15s;user-select:none;white-space:nowrap}
  .chip:hover{border-color:#33507e}
  .chip.active{color:var(--txt);border-color:var(--accent);background:var(--card-hover)}
  .chip.active.mkt{border-color:var(--mkt)}
  .chip b{color:var(--accent);margin-left:3px}
  .chip.active.mkt b{color:var(--mkt)}
  .chip.day{padding:5px 10px;border-radius:9px;font-size:.78rem}
  .srcbtn{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:5px 11px;
    font-size:.78rem;color:var(--muted);cursor:pointer;user-select:none}
  .srcbtn:hover{border-color:#33507e}
  .panel{display:none;margin-top:8px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px}
  .panel.open{display:block}
  .panel .phead{display:flex;gap:10px;margin-bottom:8px}
  .panel .phead a{color:var(--accent);font-size:.76rem;cursor:pointer;text-decoration:none}
  .panel .phead #srcClose{margin-left:auto;color:var(--muted)}
  .srcgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:4px 12px}
  .srcopt{display:flex;align-items:center;gap:7px;font-size:.82rem;color:var(--txt);cursor:pointer;padding:3px 0}
  .srcopt input{accent-color:var(--accent);width:15px;height:15px}
  .srcopt .n{color:var(--muted);font-size:.72rem;margin-left:auto}
  .indhead{display:flex;align-items:baseline;gap:8px;margin:20px 2px 8px}
  .indname{font-size:1rem;font-weight:700;letter-spacing:.5px}
  .indname::before{content:"▸";color:var(--accent);margin-right:6px;font-size:.85rem}
  .indcount{color:var(--muted);font-size:.74rem}
  .stock{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
  .stock.hw{border-color:#2f4a78}
  .stock:hover{border-color:#33507e}
  .shead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .sid{font-family:"Space Mono",monospace;font-weight:700;color:var(--accent);font-size:1.05rem}
  .sname{font-weight:650;font-size:1.05rem}
  .hwtag{background:rgba(79,156,255,.15);color:#8fc0ff;border:1px solid rgba(79,156,255,.3);
    border-radius:6px;padding:1px 6px;font-size:.66rem}
  .cnt{margin-left:auto;color:var(--muted);font-size:.78rem}
  .cnt b{color:var(--txt)}
  .item{display:flex;flex-direction:column;gap:3px;padding:9px 0;border-top:1px solid rgba(36,53,86,.6)}
  .item:first-of-type{border-top:none}
  .meta{display:flex;align-items:center;gap:7px;font-size:.72rem;color:var(--muted);flex-wrap:wrap}
  .src{background:var(--chip);color:#a9c4ef;border-radius:6px;padding:1px 7px;font-size:.7rem;white-space:nowrap}
  .badge{border-radius:5px;padding:0 6px;font-size:.66rem;white-space:nowrap}
  .badge.market{background:rgba(245,158,11,.16);color:#f0b45a}
  .badge.heavy{background:rgba(79,156,255,.14);color:#8fc0ff}
  .badge.stock{background:var(--chip);color:#8aa0c0}
  .item a.title{color:var(--txt);text-decoration:none;font-size:.92rem;line-height:1.45}
  .item a.title:hover{color:var(--accent);text-decoration:underline}
  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:.95rem}
  footer{margin-top:32px;color:var(--muted);font-size:.78rem;text-align:center;line-height:1.7}
  footer a{color:var(--accent);text-decoration:none}
  .tabs{display:flex;gap:6px;margin:14px 0 4px}
  .tab{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 16px;
    font-size:.88rem;color:var(--muted);cursor:pointer;user-select:none;transition:.15s}
  .tab:hover{border-color:#33507e}
  .tab.active{color:var(--txt);border-color:var(--accent);background:var(--card-hover);font-weight:650}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    margin:12px 0;font-size:.92rem;line-height:1.6}
  .mcard b{color:var(--txt)}
  .up{color:#ef5b5b}.down{color:#2fbf71}.mut{color:var(--muted)}
  .mtable{width:100%;border-collapse:collapse;font-size:.84rem;margin-top:4px}
  .mtable th,.mtable td{padding:5px 6px;text-align:right;border-bottom:1px solid rgba(36,53,86,.5);white-space:nowrap}
  .mtable th:first-child,.mtable td:first-child{text-align:left}
  .mtable th{color:var(--muted);font-weight:600;font-size:.74rem}
  .mtable .nm{color:var(--muted);font-size:.72rem;margin-left:5px}
  .msection{margin:18px 2px 6px;font-size:1rem;font-weight:700}
  .msection::before{content:"▸";color:var(--accent);margin-right:6px;font-size:.85rem}
  .qrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .qrow input{flex:1;min-width:140px;background:var(--bg);border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:8px 12px;font-size:.88rem;outline:none}
  .qbtn{background:var(--card-hover);border:1px solid var(--accent);color:var(--txt);border-radius:9px;
    padding:7px 16px;font-size:.86rem;cursor:pointer;user-select:none;white-space:nowrap}
  .qbtn:hover{background:#24365c}
  /* 摘要分析 */
  .insight-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:10px 0;line-height:1.75;font-size:.92rem}
  .slink{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
  .insight-md h2{font-size:1.02rem;color:var(--accent);margin:16px 0 6px;font-weight:700}
  .insight-md h2:first-child{margin-top:0}
  .insight-md h3{font-size:.94rem;color:var(--txt);margin:12px 0 4px;font-weight:650}
  .insight-md ul{margin:4px 0 8px;padding-left:20px}
  .insight-md li{margin:3px 0}
  .insight-md p{margin:6px 0}
  .insight-md strong{color:var(--txt)}
  .insight-md code{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-family:Consolas,monospace;font-size:.86rem;color:var(--accent)}
  .insight-md table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.84rem}
  .insight-md th,.insight-md td{border:1px solid var(--line);padding:5px 8px;text-align:left}
  .insight-md th{background:var(--chip);color:var(--muted)}
  .insight-note{color:var(--muted);font-size:.74rem;margin:8px 4px;line-height:1.6}
  .insight-meta{color:var(--muted);font-size:.76rem;margin:2px 4px 10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="https://shihpc.github.io/">← 回 Hub</a>
  </div>
  <header>
    <h1>🗞️ 新聞晨報</h1>
    <div class="sub" id="pageSub">投信／外資連買股的近日新聞，經來源白名單過濾後，依產業別與對大盤影響度分層。</div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="news">新聞</div>
    <div class="tab" data-tab="morning">晨報</div>
    <div class="tab" data-tab="insight">摘要分析</div>
  </div>

  <div id="newsView">
    <div class="stats" id="stats"></div>

    <div class="bar">
      <input id="q" type="search" placeholder="🔍 搜尋股號或名稱…" autocomplete="off">
      <div class="row" id="impactChips"></div>
      <div class="row"><span class="lbl">天數</span><span id="dayChips" style="display:contents"></span>
        <span class="srcbtn" id="srcToggle">來源 ▾</span></div>
      <div class="panel" id="srcPanel"></div>
    </div>

    <div id="list"><div class="empty">載入中…</div></div>
  </div>

  <div id="morningView" style="display:none">
    <div id="morningList"><div class="empty">載入中…</div></div>
  </div>

  <div id="insightView" style="display:none"></div>

  <footer>
    資料來源：FinMind · TaiwanStockNews（新聞）／
    <a href="https://github.com/shihpc/taiwan-flow-live-v2">taiwan-flow-live-v2</a>（晨報）｜過濾規格見
    <a href="https://github.com/shihpc/taiwan-stock-news">taiwan-stock-news</a>
  </footer>
</div>

<script>
const fmtDate = s => (s || "").slice(0, 16).replace("T", " ");
const day10 = s => (s || "").slice(0, 10);
const IMPACT_LABEL = { market: "盤面", heavy: "權值", stock: "個股" };
const LS_DAYS = "tsn_days", LS_DISABLED = "tsn_disabled";
let DATA = null, TDAYS = [];
const INSIGHT_MODELS = [["claude-opus-4-8","Opus 4.8（最佳判讀，約NT$3/次）"],["claude-sonnet-5","Sonnet 5（近Opus、約半價更快）"]];
const state = {
  impact: "all",
  q: "",
  days: parseInt(localStorage.getItem(LS_DAYS) || "3", 10),
  disabled: new Set(JSON.parse(localStorage.getItem(LS_DISABLED) || "[]")),
  // 摘要分析（API key 用全站共用名 anthropic_key/insight_model，非 tsn_ 前綴，三站同 origin 共用）
  insight: null, insightLoading: false, insightErr: null,
  insightModel: localStorage.getItem("insight_model") || "claude-opus-4-8",
};

function esc(s){
  return (s || "").replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
const save = () => {
  localStorage.setItem(LS_DAYS, String(state.days));
  localStorage.setItem(LS_DISABLED, JSON.stringify([...state.disabled]));
};

// 全部來源（依則數多寡）
function allSources(){
  const c = {};
  DATA.stocks.forEach(s => s.news.forEach(n => c[n.source] = (c[n.source]||0)+1));
  return Object.entries(c).sort((a,b) => b[1]-a[1]);
}
const srcOn = src => !state.disabled.has(src);

// 近 N 交易日的日期門檻
function dayThreshold(){
  const n = Math.min(state.days, TDAYS.length);
  return TDAYS[TDAYS.length - n] || TDAYS[0] || "0000-00-00";
}

// 一則新聞是否通過（來源 + 天數）
function passNews(n){
  return srcOn(n.source) && day10(n.date) >= dayThreshold();
}

function renderStats(d){
  const gen = fmtDate(d.generated_at);
  const days = TDAYS.length ? TDAYS[0] + " ~ " + TDAYS[TDAYS.length-1] : "";
  document.getElementById("stats").innerHTML =
    `<div class="stat"><b>${d.stocks_with_news ?? 0}</b>檔</div>` +
    `<div class="stat"><b>${d.total_news ?? 0}</b>則</div>` +
    `<div class="stat"><b>${TDAYS.length}</b>交易日</div>` +
    (days ? `<div class="stat">${days}</div>` : "") +
    `<div class="stat">更新 ${gen} UTC</div>`;
}

function renderImpactChips(){
  const c = { all:0, market:0, heavy:0, stock:0 };
  DATA.stocks.forEach(s => s.news.forEach(n => { if(passNews(n)){ c.all++; c[n.impact]++; } }));
  const defs = [["all","全部"],["market","盤面"],["heavy","權值股"],["stock","個股"]];
  document.getElementById("impactChips").innerHTML = defs.map(([k,label]) =>
    `<span class="chip ${state.impact===k?"active":""} ${k==="market"?"mkt":""}" data-k="${k}">`
    + `${label}<b>${c[k]||0}</b></span>`).join("");
  document.querySelectorAll("#impactChips .chip").forEach(el =>
    el.onclick = () => { state.impact = el.dataset.k; renderImpactChips(); renderList(); });
}

function renderDayChips(){
  const max = TDAYS.length || 1;
  const opts = [1,2,3,5,7,10].filter(n => n < max);
  opts.push(max);                                  // 全部
  const uniq = [...new Set(opts)].sort((a,b)=>a-b);
  document.getElementById("dayChips").innerHTML = uniq.map(n =>
    `<span class="chip day ${state.days===n?"active":""}" data-d="${n}">近${n}日</span>`).join("");
  document.querySelectorAll("#dayChips .chip").forEach(el =>
    el.onclick = () => { state.days = parseInt(el.dataset.d,10); save(); renderImpactChips(); renderDayChips(); renderList(); });
}

function setSrcPanel(open){
  document.getElementById("srcPanel").classList.toggle("open", open);
  renderSrcPanel();
}

function renderSrcPanel(){
  const list = allSources();
  const on = list.filter(([s]) => srcOn(s)).length;
  const open = document.getElementById("srcPanel").classList.contains("open");
  document.getElementById("srcToggle").textContent =
    `來源 ${on}/${list.length} ${open ? "▴" : "▾"}`;
  const rows = list.map(([s,n]) =>
    `<label class="srcopt"><input type="checkbox" data-s="${esc(s)}" ${srcOn(s)?"checked":""}>`
    + `<span>${esc(s)}</span><span class="n">${n}</span></label>`).join("");
  document.getElementById("srcPanel").innerHTML =
    `<div class="phead"><a id="selAll">全選</a><a id="selNone">清除</a>`
    + `<a id="srcClose">收合 ▴</a></div>`
    + `<div class="srcgrid">${rows}</div>`;
  document.querySelectorAll("#srcPanel input[type=checkbox]").forEach(cb =>
    cb.onchange = () => {
      const s = cb.dataset.s;
      if (cb.checked) state.disabled.delete(s); else state.disabled.add(s);
      save(); renderImpactChips(); renderSrcPanel(); renderList();
    });
  document.getElementById("selAll").onclick = () => {
    state.disabled.clear(); save(); renderImpactChips(); renderSrcPanel(); renderList();
  };
  document.getElementById("selNone").onclick = () => {
    state.disabled = new Set(list.map(([s]) => s)); save(); renderImpactChips(); renderSrcPanel(); renderList();
  };
  document.getElementById("srcClose").onclick = () => setSrcPanel(false);
}

function newsItem(n){
  const t = n.link
    ? `<a class="title" href="${esc(n.link)}" target="_blank" rel="noopener">${esc(n.title)}</a>`
    : `<span class="title">${esc(n.title)}</span>`;
  return `<div class="item">
    <div class="meta">
      <span class="badge ${n.impact}">${IMPACT_LABEL[n.impact]||"個股"}</span>
      <span class="src">${esc(n.source)}</span>
      <span>${esc(fmtDate(n.date))}</span>
    </div>${t}</div>`;
}

// 標題去尾巴(- 媒體名)+寬鬆正規化，跟 news_curation.py 的 strip_title_tail/_loose 同邏輯
const TITLE_TAIL_RE = /^(.+?)\s+[-—–|]\s+([^-—–|]{1,20})$/;
// 注意：JS 的 \W 是ASCII-only（即使加u旗標），會把中文也當非字元砍掉，
// 跟 Python re.UNICODE 的 \W 語意不同；改用 \p{L}\p{N} 明確保留任何語言的字母數字。
const LOOSE_RE = /[^\p{L}\p{N}]+/gu;
function looseTitleKey(title){
  const t = (title || "").trim();
  const m = t.match(TITLE_TAIL_RE);
  const body = m ? m[1].trim() : t;
  return body.replace(LOOSE_RE, "").toLowerCase();
}

// 大盤與財金焦點：彙整所有 impact==="market" 的新聞（不分股票），去重＋依日期新到舊
function marketNewsList(){
  const seen = new Set();
  const out = [];
  DATA.stocks.forEach(s => s.news.forEach(n => {
    if (n.impact !== "market" || !passNews(n)) return;
    // 去尾巴(- 媒體名)+寬鬆正規化後比對，跟build_news.py的strip_title_tail/_loose同邏輯：
    // 同篇文章常見同集團旗下站台轉載，標題尾巴媒體名不同（自由財經/自由時報、UDN/udn）
    const key = looseTitleKey(n.title);
    if (!key || seen.has(key)) return;
    seen.add(key);
    out.push(n);
  }));
  out.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  return out;
}

function marketSection(){
  if (state.impact !== "all" && state.impact !== "market") return "";
  const list = marketNewsList();
  if (!list.length) return "";
  return `<div class="indhead"><span class="indname">📊 大盤與財金焦點</span>`
    + `<span class="indcount">${list.length} 則</span></div>`
    + `<div class="stock">${list.map(newsItem).join("")}</div>`;
}

function stockCard(s, news){
  return `<div class="stock ${s.heavyweight?"hw":""}">
    <div class="shead">
      <span class="sid">${esc(s.stock_id)}</span>
      <span class="sname">${esc(s.name)}</span>
      ${s.heavyweight ? `<span class="hwtag">權值股</span>` : ""}
      <span class="cnt"><b>${news.length}</b> 則</span>
    </div>${news.map(newsItem).join("")}</div>`;
}

function renderList(){
  const listEl = document.getElementById("list");
  if (!DATA || !DATA.stocks){ listEl.innerHTML = `<div class="empty">無資料</div>`; return; }
  const q = state.q.trim().toLowerCase();
  const groups = {}, order = [];
  DATA.stocks.forEach(s => {
    if (q && !(s.stock_id + " " + (s.name||"")).toLowerCase().includes(q)) return;
    const news = s.news.filter(n =>
      passNews(n) && n.impact !== "market" &&
      (state.impact === "all" || n.impact === state.impact));
    if (!news.length) return;
    const ind = s.industry || "其他";
    if (!groups[ind]){ groups[ind] = []; order.push(ind); }
    groups[ind].push({ s, news });
  });
  const marketHtml = marketSection();
  let industryHtml;
  if (!order.length){
    industryHtml = marketHtml
      ? ""
      : `<div class="empty">${q ? `找不到「${esc(state.q)}」相關個股` : "此條件下目前無新聞"}</div>`;
  } else {
    order.sort((a,b) =>
      groups[b].reduce((n,x)=>n+x.news.length,0) - groups[a].reduce((n,x)=>n+x.news.length,0));
    industryHtml = order.map(ind => {
      const total = groups[ind].reduce((n,x)=>n+x.news.length,0);
      const body = groups[ind].map(x => stockCard(x.s, x.news)).join("");
      return `<div class="indhead"><span class="indname">${esc(ind)}</span>`
        + `<span class="indcount">${groups[ind].length} 檔 · ${total} 則</span></div>${body}`;
    }).join("");
  }
  listEl.innerHTML = marketHtml + industryHtml;
}

async function load(){
  try{
    const r = await fetch("news.json?t=" + Date.now());
    if (!r.ok) throw new Error(r.status);
    DATA = await r.json();
    TDAYS = (DATA.trading_days || []).slice().sort();
    if (state.days > TDAYS.length) state.days = TDAYS.length;
    renderStats(DATA);
    renderImpactChips();
    renderDayChips();
    renderSrcPanel();
    renderList();
  }catch(e){
    document.getElementById("list").innerHTML =
      `<div class="empty">尚無新聞資料（news.json 未產生或載入失敗）。<br>每日由 GitHub Actions 更新。</div>`;
  }
}

document.getElementById("q").addEventListener("input", e => { state.q = e.target.value; renderList(); });
document.getElementById("srcToggle").addEventListener("click", () =>
  setSrcPanel(!document.getElementById("srcPanel").classList.contains("open")));

// ---- 晨報 tab（跨repo唯讀讀taiwan-flow-live-v2的raw資料，不搬遷該站的抓取管線）----
const V2_BASE = "https://raw.githubusercontent.com/shihpc/taiwan-flow-live-v2/main/data";
let MORNING = null, US = null;
const sgn = (v, t) => `<span class="${v>0?"up":v<0?"down":"mut"}">${t}</span>`;
const pct = v => v==null ? "—" : (v>0?"+":"")+v.toFixed(2)+"%";
const numFmt = v => v==null ? "—" : Math.round(v).toLocaleString("en-US");

function gapHtml(m){
  if (!m || !m.gap) return "";
  const g = m.gap, s = m.spot || {};
  const dir = g.gap>50 ? "偏多" : g.gap<-50 ? "偏空" : "中性";
  return `<div class="mcard"><b>開盤參考：${sgn(g.gap, dir+" "+(g.gap>0?"+":"")+g.gap+" 點")}</b>`
    + `<div class="mut" style="font-size:.78rem;margin-top:4px">台指期夜盤（${esc(g.date||"")}）`
    + `${g.close?g.close.toLocaleString("en-US"):"—"}（${(g.chg_pct>0?"+":"")+g.chg_pct}%）`
    + ` vs 加權收盤 ${s.close?s.close.toLocaleString("en-US"):"—"}（${esc(s.date||"")}）</div></div>`;
}

function usHtml(u){
  if (!u) return "";
  let h = "";
  if (u.brief) h += `<div class="mcard"><b>${esc(u.brief)}</b>`
    + (u.session ? `<div class="mut" style="font-size:.8rem;margin-top:4px">${esc(u.session)}</div>` : "")
    + `</div>`;
  const vrCell = vr => vr==null ? '<span class="mut">—</span>' : `${vr.toFixed(2)}×`;
  const ampCell = amp => amp==null ? '<span class="mut">—</span>' : amp.toFixed(2)+"%";
  for (const g of (u.groups || [])) {
    const isAdr = (g.g||"").includes("ADR");
    h += `<div class="msection">${esc(g.g)}</div><table class="mtable"><thead><tr>`
      + `<th>${esc(g.g)}</th><th>收盤</th><th>漲跌%</th><th>量比</th><th>振幅</th>${isAdr?"<th>ADR溢價</th>":""}</tr></thead><tbody>`
      + (g.rows||[]).map(r => `<tr><td>${esc(r.n)}<span class="nm">${esc((r.s||"").replace("^",""))}</span></td>`
        + `<td>${r.c!=null?r.c.toLocaleString("en-US"):"—"}</td><td>${sgn(r.chg, pct(r.chg))}</td>`
        + `<td>${vrCell(r.vr)}</td><td>${ampCell(r.amp)}</td>`
        + (isAdr ? `<td>${r.prem!=null?sgn(r.prem,(r.prem>0?"+":"")+r.prem.toFixed(2)+"%"):'<span class="mut">—</span>'}</td>` : "")
        + `</tr>`).join("")
      + `</tbody></table>`;
  }
  return h;
}

function chipsHtml(m){
  const c = m.chips || {}, inst = c.inst;
  let lines = [];
  if (inst) lines.push(`法人（億）：外資 ${sgn(inst.foreign,(inst.foreign>0?"+":"")+inst.foreign)}`
    + `｜投信 ${sgn(inst.trust,(inst.trust>0?"+":"")+inst.trust)}｜自營 ${sgn(inst.dealer,(inst.dealer>0?"+":"")+inst.dealer)}`);
  if ((c.it3||[]).length) lines.push(`投信3日連買：${c.it3.map(x=>esc(x.n||x.c)).join("、")}`);
  if ((c.it3_sell||[]).length) lines.push(`投信3日連賣：${c.it3_sell.map(x=>esc(x.n||x.c)).join("、")}`);
  for (const l of (c.aetf||[])) lines.push(`主動ETF ${esc(l)}`);
  if ((m.exdiv||[]).length) lines.push(`今日除權息：${m.exdiv.slice(0,8).map(x=>esc(x.n||x.c)+(x.div?`(${x.div}元)`:"")).join("、")}`);
  if (!lines.length) return "";
  return `<div class="mcard">${lines.map(x=>`<div>${x}</div>`).join("")}</div>`;
}

async function loadMorning(){
  if (MORNING && US) { renderMorning(); return; }
  try{
    const [rm, ru] = await Promise.all([
      fetch(V2_BASE + "/morning.json?t=" + Date.now()),
      fetch(V2_BASE + "/us.json?t=" + Date.now()),
    ]);
    MORNING = rm.ok ? await rm.json() : null;
    US = ru.ok ? await ru.json() : null;
    renderMorning();
  }catch(e){
    document.getElementById("morningList").innerHTML =
      `<div class="empty">晨報資料載入失敗（來源：taiwan-flow-live-v2）。</div>`;
  }
}

function renderMorning(){
  const el = document.getElementById("morningList");
  if (!MORNING && !US) { el.innerHTML = `<div class="empty">尚無晨報資料。</div>`; return; }
  const genAt = MORNING && MORNING.generated_at ? esc(MORNING.generated_at) : "";
  el.innerHTML = (genAt ? `<div class="mut" style="font-size:.76rem;margin-top:4px">晨報產生於 ${genAt}</div>` : "")
    + gapHtml(MORNING) + (MORNING ? chipsHtml(MORNING) : "") + usHtml(US) + usWatchHtml();
  bindUsWatch();
  loadUsWatch();
}

// ---- 美股自選（沿用 taiwan-flow-live-v2 Worker 的 /uswatch 報價與 /usersync 同步；
//      localStorage key 沿用 tflive2_* 讓原站使用者的清單/同步碼無縫延續）----
const USW_WORKER = "https://taiwan-flow-v2.shihpc.workers.dev";
const uswList = () => { try{ return JSON.parse(localStorage.getItem("tflive2_uswatch")||"[]"); }catch(e){ return []; } };
const uswSave = l => localStorage.setItem("tflive2_uswatch", JSON.stringify(l));
const uswSyncCode = () => localStorage.getItem("tflive2_usw_sync") || "";
let uswCache = null, uswPulled = false;
const uswFetch = async u => { const r = await fetch(u); if(!r.ok) throw new Error(r.status); return r.json(); };
async function uswRemotePull(){
  if (!uswSyncCode() || uswPulled) return;
  try{
    const j = await uswFetch(USW_WORKER + "/usersync?k=" + encodeURIComponent(uswSyncCode()));
    if (j && Array.isArray(j.list)) { uswSave(j.list); uswCache = null; }
  }catch(e){}
  uswPulled = true;
}
function uswRemotePush(){
  if (!uswSyncCode()) return;
  uswFetch(USW_WORKER + "/usersync?k=" + encodeURIComponent(uswSyncCode())
    + "&set=" + encodeURIComponent(uswList().join(","))).catch(()=>{});
}
function usWatchHtml(){
  const syncOn = !!uswSyncCode();
  const inStyle = "background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:6px 9px;font-size:.82rem;flex:1;min-width:0;width:auto;outline:none";
  const btnStyle = "background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 11px;font-size:.8rem;cursor:pointer;white-space:nowrap";
  const syncUi = syncOn
    ? `<span class="mut" style="font-size:.72rem;white-space:nowrap">☁${esc(uswSyncCode().slice(0,2))}***</span><button style="${btnStyle}" id="uswSyncOff">停用</button>`
    : `<input id="uswSyncIn" placeholder="同步碼≥4字" style="${inStyle}" maxlength="64">
       <button style="${btnStyle}" id="uswSyncEn">☁同步</button>`;
  return `<div class="msection">自選<span class="mut" style="font-size:.74rem;font-weight:400">（${syncOn?"跨裝置同步":"僅存本機"}）</span></div>
  <div style="display:flex;gap:5px;margin:6px 0 8px;align-items:center">
    <input id="uswIn" placeholder="代號如PLTR" style="${inStyle}" maxlength="8">
    <button style="${btnStyle}" id="uswAdd">加入</button>
    ${syncUi}
  </div>
  <div id="uswBox">${uswList().length||uswSyncCode()?'<div class="mut" style="font-size:.8rem">載入自選…</div>':'<div class="mut" style="font-size:.8rem">尚無自選。輸入美股代號加入（上限 12 檔）；設同步碼可跨裝置共用清單。</div>'}</div>`;
}
function bindUsWatch(){
  const btn = document.getElementById("uswAdd"), inp = document.getElementById("uswIn");
  if (!btn) return;
  const add = () => {
    const v = (inp.value||"").trim().toUpperCase();
    if (!/^[A-Z0-9^.\-]{1,8}$/.test(v)) { alert("代號格式不對"); return; }
    const l = uswList();
    if (l.includes(v)) return;
    if (l.length >= 12) { alert("自選上限 12 檔"); return; }
    l.push(v); uswSave(l); uswRemotePush(); uswCache = null; inp.value = "";
    renderMorning();
  };
  btn.onclick = add;
  inp.onkeydown = e => { if (e.key === "Enter") add(); };
  const en = document.getElementById("uswSyncEn");
  if (en) en.onclick = async () => {
    const v = (document.getElementById("uswSyncIn").value||"").trim();
    if (v.length < 4) { alert("同步碼至少 4 個字"); return; }
    localStorage.setItem("tflive2_usw_sync", v);
    try{
      const j = await uswFetch(USW_WORKER + "/usersync?k=" + encodeURIComponent(v));
      if (j && Array.isArray(j.list) && j.list.length) uswSave(j.list);
      else uswRemotePush();
    }catch(e){ alert("同步啟用失敗：" + (e.message||e)); }
    uswPulled = true; uswCache = null; renderMorning();
  };
  const off = document.getElementById("uswSyncOff");
  if (off) off.onclick = () => { localStorage.removeItem("tflive2_usw_sync"); uswPulled = false; renderMorning(); };
}
async function loadUsWatch(){
  await uswRemotePull();
  const box = document.getElementById("uswBox"), l = uswList();
  if (!box) return;
  if (!l.length) { box.innerHTML = '<div class="mut" style="font-size:.8rem">尚無自選。輸入美股代號加入（上限 12 檔）。</div>'; return; }
  const key = l.join(",");
  if (!uswCache || uswCache.key !== key) {
    try{
      const j = await uswFetch(USW_WORKER + "/uswatch?t=" + encodeURIComponent(key));
      uswCache = { key, rows: j.rows || [] };
    }catch(e){ box.innerHTML = '<div class="mut" style="font-size:.8rem">自選載入失敗：' + esc(String(e.message||e)) + '</div>'; return; }
  }
  const rows = uswCache.rows;
  // 中文名：先查 us.json 固定組（同代號沿用），再查常用自選對照，查不到只顯示代號
  const USW_NAMES = { SMCI:"美超微", COIN:"Coinbase", USO:"原油ETF", DRAM:"DRAM ETF" };
  const nameMap = {};
  for (const g of ((US && US.groups) || [])) for (const r of (g.rows||[])) nameMap[r.s] = r.n;
  const nameOf = s => nameMap[s] || USW_NAMES[s] || null;
  box.innerHTML = `<table class="mtable"><thead><tr><th>自選</th><th>收盤</th><th>漲跌%</th><th>量比</th><th>振幅</th><th></th></tr></thead><tbody>`
    + rows.map(r => {
      const nm = nameOf(r.s);
      const first = r.err
        ? esc(r.s)+' <span class="mut">('+esc(r.err)+')</span>'
        : (nm ? `${esc(nm)}<span class="nm">${esc(r.s)}</span>` : `<b>${esc(r.s)}</b>`)
          + `<span class="nm">${esc(r.d||"")}</span>`;
      return `<tr><td>${first}</td>`
      + `<td>${r.c==null?'—':(r.c>=1000?r.c.toLocaleString("en-US",{maximumFractionDigits:0}):r.c.toLocaleString("en-US"))}</td>`
      + `<td>${r.chg==null?'—':sgn(r.chg,pct(r.chg))}</td>`
      + `<td>${r.vr==null?'—':r.vr.toFixed(2)+"×"}</td>`
      + `<td>${r.amp==null?'—':r.amp.toFixed(2)+"%"}</td>`
      + `<td><span style="cursor:pointer;color:var(--muted)" data-uswdel="${esc(r.s)}">✕</span></td></tr>`;
    }).join("")
    + `</tbody></table>`;
}
document.addEventListener("click", e => {
  const d = e.target.closest("[data-uswdel]");
  if (!d) return;
  uswSave(uswList().filter(x => x !== d.dataset.uswdel));
  uswRemotePush(); uswCache = null; renderMorning();
});

// ---------- 摘要分析（前端即時呼叫 Claude API；框架照搬 postmkt） ----------
// key 只存本機 localStorage，只隨查詢送給 Anthropic，不進 repo、不傳第三方。
const anthKey = () => localStorage.getItem("anthropic_key") || "";
// 台灣時間 "YYYY-MM-DD HH:MM:SS"（sv-SE locale 給 ISO 樣式，指定 Asia/Taipei 時區）
const twNow = () => new Date().toLocaleString("sv-SE", { timeZone:"Asia/Taipei" });
// ---------- 雲端儲存共用（GitHub Contents API；三站逐字相同：postmkt /
// taiwan-flow-live-v2 / taiwan-stock-news，修改請三站同步）----------
// PAT 只存本機 localStorage（gh_token），只隨請求送給 GitHub API 本身，不進 repo、不傳第三方。
const ghToken = () => localStorage.getItem("gh_token") || "";
// 台北日 YYYYMMDD（檔名用）
const twDay8 = () => twNow().slice(0, 10).replace(/-/g, "");
// base64 ⇄ UTF-8：btoa/atob 只吃 Latin-1，中文要先過 TextEncoder/TextDecoder
const b64EncodeUtf8 = s => { const b = new TextEncoder().encode(s); let r = ""; for (let i = 0; i < b.length; i += 0x8000) r += String.fromCharCode.apply(null, b.subarray(i, i + 0x8000)); return btoa(r); };
const b64DecodeUtf8 = s => { const bin = atob(String(s || "").replace(/\s+/g, "")); const b = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i); return new TextDecoder().decode(b); };
// 分析結果存 GitHub（shihpc/postmkt main 的 data/analyses/{fileName}）：
// GET 現檔（404=新檔）→ 解出當日陣列 → push entry → 超過 10 筆丟最舊 → PUT（帶 sha 防蓋寫）。
// 409/422（寫入衝突）→ 重新 GET 再試一次。回傳 {ok, err}；呼叫端自行決定怎麼呈現。
async function ghSaveAnalysis(fileName, entry){
  const token = ghToken();
  if (!token) return { ok: false, err: "未設定 GitHub token" };
  const api = "https://api.github.com/repos/shihpc/postmkt/contents/data/analyses/" + fileName;
  const headers = { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json" };
  const attempt = async () => {
    let sha = null, arr = [];
    const g = await fetch(api + "?ref=main", { headers });
    if (g.status === 200){
      const j = await g.json();
      sha = j.sha || null;
      try { const cur = JSON.parse(b64DecodeUtf8(j.content || "")); if (Array.isArray(cur)) arr = cur; } catch (e) {}
    } else if (g.status !== 404){
      throw new Error("讀取現檔失敗 HTTP " + g.status);
    }
    arr.push(entry);
    while (arr.length > 10) arr.shift();
    const body = { message: "analysis: " + fileName.replace(/-\d{8}\.json$/, "") + " " + String(entry.at || "").slice(0, 16),
      content: b64EncodeUtf8(JSON.stringify(arr)), branch: "main" };
    if (sha) body.sha = sha;
    const p = await fetch(api, { method: "PUT", headers, body: JSON.stringify(body) });
    if (p.status === 409 || p.status === 422) return { conflict: true };
    if (!p.ok){ const j = await p.json().catch(() => ({})); throw new Error("PUT HTTP " + p.status + (j.message ? "：" + j.message : "")); }
    return { conflict: false };
  };
  try {
    let r = await attempt();
    if (r.conflict) r = await attempt();
    if (r.conflict) throw new Error("寫入衝突（重試一次仍失敗）");
    return { ok: true, err: null };
  } catch (e) {
    return { ok: false, err: String(e.message || e) };
  }
}
// runInsight／runSummary 成功後自動存雲端：PAT 未設→靜默跳過；async 不阻塞渲染，
// 存完把結果寫回 rec.cloud（"ok"／"err:原因"）再由呼叫端 rerender 補 meta 行。
function saveAnalysisCloud(rec, kind, entry, rerender){
  if (!ghToken()) return;
  rec.cloud = "saving";
  ghSaveAnalysis(kind + "-" + twDay8() + ".json", entry)
    .then(r => { rec.cloud = r.ok ? "ok" : "err:" + (r.err || "未知錯誤"); rerender(); });
}
// ---------- 雲端儲存共用結束 ----------
// 雲端儲存狀態 → meta 補充行（saving 中不顯示；成功/失敗各一行）
const cloudLineHtml = c => c === "ok" ? `<div class="insight-meta">☁已存雲端（其他裝置約 5 分鐘後可見）</div>`
  : (typeof c === "string" && c.indexOf("err:") === 0) ? `<div class="insight-meta">⚠雲端儲存失敗：${esc(c.slice(4))}</div>` : "";
// 極簡 markdown→HTML（LLM 輸出用）：標題/清單/粗體/行內碼/表格/段落。夠用即可，不引入外部庫。
function mdToHtml(md){
  const esc2 = s => s.replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const inline = s => esc2(s).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>");
  const lines = String(md||"").split("\n");
  let html = "", i = 0;
  while (i < lines.length){
    const ln = lines[i];
    if (/^\s*\|.*\|\s*$/.test(ln) && i+1<lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])){
      const cell = r => r.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(c=>c.trim());
      const head = cell(ln); i += 2;
      let body = "";
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ body += "<tr>"+cell(lines[i]).map(c=>`<td>${inline(c)}</td>`).join("")+"</tr>"; i++; }
      html += `<table><thead><tr>${head.map(c=>`<th>${inline(c)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>`;
      continue;
    }
    let m;
    if ((m = ln.match(/^##\s+(.*)/))) html += `<h2>${inline(m[1])}</h2>`;
    else if ((m = ln.match(/^###\s+(.*)/))) html += `<h3>${inline(m[1])}</h3>`;
    else if (/^\s*[-*]\s+/.test(ln)){
      let items = "";
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])){ items += `<li>${inline(lines[i].replace(/^\s*[-*]\s+/,""))}</li>`; i++; }
      html += `<ul>${items}</ul>`; continue;
    }
    else if (ln.trim()==="") { /* skip */ }
    else html += `<p>${inline(ln)}</p>`;
    i++;
  }
  return html;
}
// 個股代號→Yahoo 技術分析連結（三站逐字相同：postmkt / taiwan-flow-live-v2 /
// taiwan-stock-news，修改請三站同步）。在 mdToHtml 輸出後呼叫；用 tag 切分法只處理
// 標籤外的文字片段，不破壞既有 HTML、也天然不會重包已在 <a> 內的文字。
// 防誤連雙層：①候選 ∈ knownSet（頁面記憶體已知代號）②兜底＝代號後緊跟中文股名
// （首字不在單位黑名單）。緊鄰英數/小數點、或後接 -、/（日期 2026-07-11）皆不連。
function linkifyStocks(html, knownSet){
  const BLACK = "年月日時分點張口億萬元筆家檔次倍天週股"; // 單位/時間字：後接這些多半不是股名
  const CJK = ch => !!ch && /[一-鿿]/.test(ch);
  const link = c => `<a href="https://tw.stock.yahoo.com/quote/${c}/technical-analysis" target="_blank" rel="noopener" class="slink">${c}</a>`;
  return String(html||"").split(/(<[^>]*>)/).map(seg => {
    if (seg.charAt(0) === "<") return seg;
    return seg.replace(/(00[0-9]{3,4}[A-Z]?|[0-9]{4}[A-Z]?)/g, (m, _g, off) => {
      const prev = seg.charAt(off-1), next = seg.charAt(off+m.length);
      const n2 = seg.charAt(off+m.length+1), n3 = seg.charAt(off+m.length+2);
      if (/[0-9A-Za-z.]/.test(prev) || /[0-9.\-\/]/.test(next)) return m;
      if (CJK(next)){
        // 兜底：後緊跟中文股名。首字在黑名單→不連（含集合內代號，防「2026年」誤連）；
        // 「元」例外：元+中文次字視為元大/元太等股名，但「元大關」（千元大關）除外。
        const ok = next === "元" ? (CJK(n2) && !(n2 === "大" && n3 === "關"))
                                 : !BLACK.includes(next);
        return ok ? link(m) : m;
      }
      return (knownSet && knownSet.has(m)) ? link(m) : m;
    });
  }).join("");
}
// 已知個股代號集合（linkifyStocks 主驗證用）：DATA 股票池＋晨報籌碼（投信連買賣、
// 主動ETF 字串內代號）；資料未載入時回空 Set（此時只剩兜底規則，行為仍安全）。
function stockCodeSet(){
  const set = new Set();
  const add = c => { if (c != null && c !== "") set.add(String(c)); };
  for (const s of ((DATA||{}).stocks)||[]) add(s.stock_id);
  const ch = ((MORNING||{}).chips)||{};
  for (const x of (ch.it3||[])) add(x.c);
  for (const x of (ch.it3_sell||[])) add(x.c);
  for (const l of (ch.aetf||[])) for (const m of (String(l||"").match(/\d{4,6}/g)||[])) add(m);
  return set;
}
// 從本頁記憶體資料彙整成給 LLM 的精簡文字（不 dump 全量，只取關鍵訊號欄位）。
// 日期對齊：以新聞主資料日(primary＝最新交易日)為準，各段標注自己的資料日；
// 不同日的段落明確標警告，避免 LLM 跨不同交易日直接比較。回傳 {text, primary, dates}。
function insightGatherContext(){
  const d = DATA || {};
  const primary = (TDAYS.length ? TDAYS[TDAYS.length-1] : "") || day10(d.generated_at || "");
  const dates = {};
  // 日期比較用正規化（跨repo資料可能用斜線 2026/07/13，本站用連字號 2026-07-09，
  // 格式不同會誤判成不同日，比較前統一成連字號）。
  const norm = s => String(s||"").replace(/\//g,"-");
  const dlabel = (name, secDate) => {
    dates[name] = secDate || "?";
    if (!secDate) return `【${name}（資料日不明）】`;
    if (norm(secDate) === norm(primary)) return `【${name}（資料日 ${secDate}）】`;
    return `【${name}（⚠資料日 ${secDate}，與主資料日 ${primary} 不同，請勿與其他段落跨日直接比較）】`;
  };
  const parts = [];
  // a. 大盤與財金焦點新聞：全部 impact=market，去重（同文轉載）後依日期新→舊取前12
  const mkt = [], seen = new Set();
  (d.stocks||[]).forEach(s => (s.news||[]).forEach(n => {
    if (n.impact !== "market") return;
    const key = looseTitleKey(n.title);
    if (key && seen.has(key)) return;
    if (key) seen.add(key);
    mkt.push(n);
  }));
  mkt.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  if (mkt.length){
    parts.push(`${dlabel("大盤與財金焦點新聞 前12（新→舊）", primary)}\n`
      + mkt.slice(0,12).map(n=>`${day10(n.date)}|${n.source}|${n.title}`).join("\n"));
  }
  // b. 個股新聞熱度：依新聞則數前15，每檔附產業/權重/最新2則標題
  const tops = (d.stocks||[]).slice()
    .sort((a,b)=>(b.count||(b.news||[]).length) - (a.count||(a.news||[]).length)).slice(0,15);
  if (tops.length){
    const line = s => {
      const ns = (s.news||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,2)
        .map(n=>`${day10(n.date)}《${n.title}》`).join("；");
      return `${s.stock_id}${s.name||""}${s.heavyweight?"[權值]":""}|${s.industry||"—"}`
        + `|大盤權重${s.weight_per!=null?s.weight_per+"%":"—"}|新聞${s.count||(s.news||[]).length}則|最新：${ns||"—"}`;
    };
    parts.push(`${dlabel("個股新聞熱度 前15（依新聞則數）", primary)}\n`+tops.map(line).join("\n"));
  }
  // c. 晨報籌碼（跨repo讀v2；晨報資料日常與新聞主資料日不同，dlabel會標警告）
  if (MORNING){
    const mDate = day10(MORNING.generated_at || "");
    const c = MORNING.chips || {}, lines = [];
    if (MORNING.gap){
      const g = MORNING.gap, s = MORNING.spot || {};
      lines.push(`期指開盤參考：台指期夜盤${g.close!=null?g.close:"—"}（${g.chg_pct>0?"+":""}${g.chg_pct}%）`
        + ` vs 加權收盤${s.close!=null?s.close:"—"}，價差${g.gap>0?"+":""}${g.gap}點`);
    }
    if (c.inst) lines.push(`三大法人買賣超（億）：外資${c.inst.foreign>0?"+":""}${c.inst.foreign}`
      + `｜投信${c.inst.trust>0?"+":""}${c.inst.trust}｜自營${c.inst.dealer>0?"+":""}${c.inst.dealer}`);
    if ((c.it3||[]).length) lines.push(`投信3日連買：${c.it3.map(x=>(x.c||"")+(x.n||"")).join("、")}`);
    if ((c.it3_sell||[]).length) lines.push(`投信3日連賣：${c.it3_sell.map(x=>(x.c||"")+(x.n||"")).join("、")}`);
    if ((c.aetf||[]).length) lines.push(`主動ETF動向：${c.aetf.join("；")}`);
    if (lines.length) parts.push(`${dlabel("晨報籌碼", mDate)}\n`+lines.join("\n"));
    // d. 隔夜美股（與晨報同批產生，沿用晨報資料日；美股本質為隔夜資料，SYS已禁跨日串連）
    if (US){
      const uLines = [];
      if (US.brief) uLines.push(US.brief + (US.session ? `（${US.session}）` : ""));
      for (const g of (US.groups||[])){
        uLines.push(`${g.g}：${(g.rows||[]).slice(0,3)
          .map(r=>`${r.n}${r.chg!=null?(r.chg>0?"+":"")+r.chg.toFixed(2)+"%":"—"}`).join("、")}`);
      }
      if (uLines.length) parts.push(`${dlabel("隔夜美股", mDate)}\n`+uLines.join("\n"));
    }
  } else {
    parts.push("【晨報籌碼】（晨報資料未載入，本段略過，僅分析新聞面）");
  }
  return { text: parts.join("\n\n"), primary, dates };
}
// 打開 adaptive thinking：Opus 4.8 省略 thinking=不思考，故明確指定；effort medium 平衡
// 深度與延遲；只取 text block(thinking display 預設 omitted，不渲染思考)。max_tokens 拉高
// 給思考+輸出留空間。signal 為可選 AbortSignal（中斷用），不傳＝行為不變；
// 中斷時把 AbortError 轉成好讀的「已手動中斷」。
// 【三站同步】本函式在 postmkt／taiwan-flow-live-v2／taiwan-stock-news 逐字一致，改動需同步三站。
async function callClaude(key, model, system, userMsg, signal){
  try{
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "content-type":"application/json", "x-api-key":key,
        "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({ model, max_tokens:8000,
        thinking:{ type:"adaptive" }, output_config:{ effort:"medium" },
        system, messages:[{role:"user",content:userMsg}] }),
      signal
    });
    const j = await r.json();
    if (!r.ok || (j.type==="error")) throw new Error((j.error && j.error.message) || ("HTTP "+r.status));
    if (j.stop_reason === "refusal") throw new Error("模型基於安全政策婉拒本次請求");
    const text = (j.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    return { text, usage: j.usage || null };
  }catch(e){
    if (e && e.name === "AbortError") throw new Error("已手動中斷");
    throw e;
  }
}
async function runInsight(){
  if (!anthKey()){ alert("請先輸入並儲存 Anthropic API token"); return; }
  state.insightLoading = true; state.insightErr = null; renderInsight();
  try{
    // 晨報資料未載入（使用者沒開過晨報tab）就先補抓；失敗不擋新聞面分析
    if (!MORNING && typeof loadMorning === "function"){ try{ await loadMorning(); }catch(e){} }
    const g = insightGatherContext();
    if (!g.text.trim()) throw new Error("本頁資料尚未載入完成，請稍候再試");
    const SYS = "你是積極的台股新聞與籌碼交叉分析師。任務：彙整本頁新聞焦點與晨報籌碼資料，產出以「找出具新聞催化＋籌碼支持的 alpha 標的」為核心的洞見與可操作建議。要求：(1) 進出建議一律以『同向共振』為基礎——新聞催化與籌碼方向一致才算有效訊號（例：個股利多新聞密集＋投信連買或主動ETF加碼＝催化與籌碼共振偏多；利空新聞＋法人賣超＝共振偏空）。(2) 只聚焦同向共振訊號；背離（如利多新聞但法人大賣）不適合作為進出參考，一律略過、不呈現、不描述、不列背離段落。(3) 依資料呈現的傾向做方向性判斷，對共振標的給偏多／偏空看法與明確進出建議。(4) 每條洞見／建議必須點名個股代號＋可追溯的具體依據(新聞標題與日期、法人買賣超數字、連買天數等)，禁止空泛臆測。(5) 洞見與建議合計不超過 10 條，挑共振最強、依據最紮實的。(6) 建議個股以 alpha 為首要考量，優先納入中小型標的；大型權值股(台灣50成分、2330台積電/2317鴻海/2454聯發科、金控股等)合計不得超過清單一半——上限而非目標，不必硬湊。(7) 新聞僅代表資訊面、非事實核實，判讀須註明消息面屬性；美股與晨報資料若與主資料日不同，僅可單獨解讀、嚴禁跨日串連成訊號。(8) 繁體中文、markdown(## 標題、- 清單、**粗體**、可用表格)。結構：## 核心洞見與操作建議(≤10 條，每條＝個股代號名稱 ｜ 共振訊號 ｜ 依據 ｜ 方向與進出建議；大型股≤一半)／## 訊號邏輯(簡述共振推論)。不要有背離段落。最後一行附免責：以上為新聞與籌碼交叉的模型即時研判、未經歷史回測、非投資建議、非保證獲利，僅供你自行參考。";
    const USER = `主資料日（以此為準）：${g.primary}\n各段資料日：${JSON.stringify(g.dates)}\n（凡標注「與主資料日不同」的段落，僅可單獨解讀，勿跨日比較）\n\n${g.text}`;
    const res = await callClaude(anthKey(), state.insightModel, SYS, USER);
    state.insight = { text: res.text, usage: res.usage, at: twNow(), date: g.primary, model: state.insightModel };
    saveAnalysisCloud(state.insight, "insight-news",
      { at: state.insight.at, model: state.insight.model, text: state.insight.text, usage: state.insight.usage, date: state.insight.date },
      () => renderInsight());
  }catch(e){
    state.insightErr = String(e.message || e);
  }
  state.insightLoading = false; renderInsight();
}

  if (state.insightLoading){ h += `<div class="empty">Claude 分析中…（依資料量約需 10-30 秒）</div>`; return h; }

  if (state.insight){

  }
  h += cloudHistSectionHtml();

const CLOUD_RAW = "https://raw.githubusercontent.com/shihpc/postmkt/main/data/analyses/";
const CLOUD_KIND = "insight-news";
// 近 n 個台北日 YYYYMMDD（今日在前；休市日檔案不存在→404 靜默略過）
const twDayList = n => Array.from({length:n}, (_,i) =>
  new Date(Date.now()-i*864e5).toLocaleDateString("sv-SE",{timeZone:"Asia/Taipei"}).replace(/-/g,""));
let CLOUD_HIST; // undefined=未載入、"loading"=載入中、陣列=完成
let cloudOpen = null;
function cloudLoadHist(){
  CLOUD_HIST = "loading";
  const files = twDayList(3).map(d => ({ file:`${CLOUD_KIND}-${d}.json`, day:d }));
  Promise.all(files.map(f => fetch(CLOUD_RAW + f.file + "?t=" + Date.now())
      .then(r => r.ok ? r.json() : null).catch(() => null)))
    .then(res => {
      const items = [];
      res.forEach((arr,i) => { if (Array.isArray(arr)) arr.forEach(e => items.push({ ...files[i], entry:e })); });
      items.sort((a,b) => String(b.entry.at||"").localeCompare(String(a.entry.at||"")));
      CLOUD_HIST = items;
    })
    .then(() => renderInsight());
}
function cloudHistSectionHtml(){
  let h = `<div class="msection">雲端歷史（近3日）<span class="mut" style="font-size:.74rem;font-weight:400;margin-left:6px">本站摘要，存於 GitHub postmkt repo · 點列展開閱讀</span></div>`;
  if (CLOUD_HIST === undefined){ cloudLoadHist(); return h + `<div class="empty">載入雲端歷史…</div>`; }
  if (CLOUD_HIST === "loading") return h + `<div class="empty">載入雲端歷史…</div>`;
  if (!CLOUD_HIST.length) return h + `<div class="empty" style="font-size:.84rem">尚無雲端儲存（設定 GitHub token 後自動儲存）</div>`;
  h += `<div class="mcard" style="padding:8px 14px">` + CLOUD_HIST.map((it,i) => {
    const dd = it.day.slice(0,4)+"-"+it.day.slice(4,6)+"-"+it.day.slice(6);
    return `<div data-cloud-open="${i}" style="padding:4px 0;cursor:pointer${cloudOpen===i?";font-weight:700":""}">`
      + `<span class="sid" style="font-size:.88rem">${esc(dd)}</span> 新聞摘要`
      + `<span class="mut" style="font-size:.74rem;margin-left:8px">${esc(String(it.entry.at||"").slice(11,16))}${it.entry.model?` · ${esc(it.entry.model)}`:""}</span></div>`;
  }).join("") + `</div>`;
  const cur = cloudOpen != null ? CLOUD_HIST[cloudOpen] : null;
  if (cur){
    const u = cur.entry.usage;
    const tok = u ? `輸入 ${numFmt((u.input_tokens||0)+(u.cache_read_input_tokens||0)+(u.cache_creation_input_tokens||0))}／輸出 ${numFmt(u.output_tokens||0)} token` : "token數不明";
    h += `<div class="insight-meta">雲端 新聞摘要 · 生成時間 ${esc(cur.entry.at||"")}（台灣）· 資料日 ${esc(cur.entry.date||"—")} · 模型 ${esc(cur.entry.model||"—")} · ${tok}</div>`;
    h += `<div class="insight-card insight-md">${linkifyStocks(mdToHtml(cur.entry.text||""), stockCodeSet())}</div>`;
  }
  return h;
}
